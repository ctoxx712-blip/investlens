<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.35">
      <stop offset="0" stop-color="#2a6bc2"/>
      <stop offset="1" stop-color="#22a374"/>
    </linearGradient>
    <mask id="gearhole">
      <rect x="0" y="0" width="512" height="512" fill="#fff"/>
      <circle cx="150" cy="142" r="22" fill="#000"/>
    </mask>
  </defs>
  <rect x="20" y="20" width="472" height="472" rx="110" fill="url(#bg)" stroke="#cdecec" stroke-width="14"/>
  <!-- 齒輪 -->
  <g fill="#d9a845" mask="url(#gearhole)">
    <rect x="86" y="129" width="128" height="26" rx="9"/>
    <rect x="137" y="78" width="26" height="128" rx="9"/>
    <g transform="rotate(45 150 142)">
      <rect x="86" y="129" width="128" height="26" rx="9"/>
      <rect x="137" y="78" width="26" height="128" rx="9"/>
    </g>
    <circle cx="150" cy="142" r="46"/>
  </g>
  <!-- 蠟燭 + 底線 -->
  <g fill="#d9a845">
    <rect x="86" y="436" width="340" height="14" rx="7"/>
    <rect x="116" y="382" width="8" height="54"/>
    <rect x="106" y="398" width="28" height="38" rx="3"/>
    <rect x="168" y="352" width="8" height="84"/>
    <rect x="158" y="372" width="28" height="60" rx="3"/>
    <rect x="220" y="362" width="8" height="74"/>
    <rect x="210" y="380" width="28" height="52" rx="3"/>
    <rect x="272" y="342" width="8" height="94"/>
    <rect x="262" y="362" width="28" height="66" rx="3"/>
    <rect x="324" y="316" width="8" height="120"/>
    <rect x="314" y="338" width="28" height="90" rx="3"/>
    <rect x="390" y="252" width="8" height="184"/>
    <rect x="378" y="286" width="32" height="150" rx="3"/>
  </g>
  <!-- 上升箭嘴 -->
  <g stroke="#d9a845" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="96,408 202,294 254,342 398,196"/>
  </g>
  <polygon fill="#d9a845" points="440,152 346,176 408,242"/>
  <!-- 放大鏡（最上層） -->
  <g fill="#d9a845">
    <rect x="118" y="252" width="86" height="34" rx="17" transform="rotate(42 161 269)"/>
    <rect x="204" y="200" width="18" height="32" rx="3"/>
    <rect x="232" y="182" width="18" height="50" rx="3"/>
    <rect x="260" y="164" width="18" height="68" rx="3"/>
  </g>
  <circle cx="240" cy="188" r="80" fill="none" stroke="#d9a845" stroke-width="19"/>
</svg>
